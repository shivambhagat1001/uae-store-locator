<!DOCTYPE html>
<html>
<head>
    <title>Store Locator with Suggestions</title>
    <style>
        body { font-family: Arial; padding: 20px; }

        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 300px;
        }

        .suggestions {
            border: 1px solid #ccc;
            max-width: 300px;
            position: absolute;
            background: #fff;
            z-index: 1000;
        }

        .suggestion-item {
            padding: 8px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #f0f0f0;
        }

        .store {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h2>Store Locator</h2>

<input type="text" id="location" placeholder="Type location...">
<div id="suggestions" class="suggestions"></div>

<button onclick="findStores()">Find Stores</button>

<br><br>

<label>Latitude:</label><br>
<input type="text" id="lat" readonly>

<br>

<label>Longitude:</label><br>
<input type="text" id="lng" readonly>

<div id="results"></div>

<script>

const stores = [
    { name: "Dubai Garage", lat: 25.2048, lng: 55.2708 },
    { name: "Abu Dhabi Garage", lat: 24.4539, lng: 54.3773 },
    { name: "Sharjah Garage", lat: 25.3463, lng: 55.4209 }
];

let isValidLocation = false;


const input = document.getElementById('location');
const suggestionsBox = document.getElementById('suggestions');

let timeout = null;

input.addEventListener('input', function () {

    isValidLocation = false;

    clearTimeout(timeout);
    const query = this.value;

    if (query.length < 3) {
        suggestionsBox.innerHTML = "";
        return;
    }

    timeout = setTimeout(() => {

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=ae&limit=5`)
            .then(res => res.json())
            .then(data => {

                suggestionsBox.innerHTML = "";

                if (!data.length) {
                    suggestionsBox.innerHTML = `
                        <div class="suggestion-item" style="color:red;">
                            No locations found in UAE
                        </div>
                    `;
                    return;
                }

                const uniquePlaces = [];
                const seen = new Set();

                data.forEach(place => {
                    if (!seen.has(place.display_name)) {
                        seen.add(place.display_name);
                        uniquePlaces.push(place);
                    }
                });

                uniquePlaces.forEach(place => {
                    const div = document.createElement('div');
                    div.classList.add('suggestion-item');
                    div.innerText = place.display_name;

                    div.onclick = function () {
                        input.value = place.display_name;

                        document.getElementById('lat').value = place.lat;
                        document.getElementById('lng').value = place.lon;

                        isValidLocation = true;

                        suggestionsBox.innerHTML = "";
                    };

                    suggestionsBox.appendChild(div);
                });

            });

    }, 500);
});

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function findStores() {

    if (!isValidLocation) {
        alert("Please select a valid UAE location from suggestions");
        return;
    }

    const userLat = parseFloat(document.getElementById('lat').value);
    const userLng = parseFloat(document.getElementById('lng').value);

    processStores(userLat, userLng);
}

function processStores(userLat, userLng) {

    let results = [];

    stores.forEach(store => {
        const distance = getDistance(userLat, userLng, store.lat, store.lng);

        results.push({
            ...store,
            distance: distance.toFixed(2)
        });
    });

    results.sort((a, b) => a.distance - b.distance);

    displayResults(results);
}

function displayResults(results) {
    const div = document.getElementById('results');
    div.innerHTML = "";

    results.forEach(store => {
        div.innerHTML += `
            <div class="store">
                <strong>${store.name}</strong><br>
                ${store.distance} km away
            </div>
        `;
    });
}

</script>

</body>
</html>
